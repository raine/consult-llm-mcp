[package]
name = "consult-llm-mcp"
version = "2.5.0"
edition = "2024"
build = "build.rs"

[dependencies]
rmcp = { version = "1.1", features = ["server", "transport-io"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "io-util", "sync", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
async-trait = "0.1"
thiserror = "2"
anyhow = "1"
dirs = "6"
arboard = "3"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
pathdiff = "0.2"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "test-util"] }
